<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{font-family:var(--font-sans,system-ui,Arial);color:var(--color-text-primary,#111);padding:1rem 1rem 2rem}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary,#ddd);margin-bottom:1.25rem}
.topbar-left{display:flex;align-items:center;gap:10px}
.app-title{font-size:17px;font-weight:500}
.save-pill{font-size:11px;color:var(--color-text-tertiary,#666);padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary,#ddd)}
.layout{display:grid;grid-template-columns:190px 1fr;gap:16px;align-items:start}
@media(max-width:580px){
  .layout{display:block;grid-template-columns:1fr}
  .sidebar{margin-bottom:14px}
}
@media(max-width:720px){
  .app{padding:0.75rem 0.75rem 1.5rem}
  .topbar{flex-wrap:wrap;gap:8px}
  .topbar-left{gap:8px}
  .app-title{font-size:16px}
  .save-pill{font-size:10px;padding:3px 8px}
  .sidebar{border-radius:12px}
  .sidebar-head{padding:8px 10px}
  .table-list{max-height:220px;overflow-y:auto}
  .table-item{padding:10px 12px;font-size:12px}
  .add-t-btn{padding:10px 12px;font-size:12px}
  .stats-row{grid-template-columns:repeat(2,minmax(90px,1fr));gap:6px;margin-bottom:10px}
  .stat{padding:8px 10px}
  .card-head{padding:10px 12px;flex-direction:column;align-items:stretch}
  .card-actions{gap:8px;flex-direction:column;align-items:stretch}
  .card-actions .btn{width:100%;text-align:center}
  .card-title-input{font-size:14px}
  .btn{padding:8px 10px;font-size:12px}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .th, td{padding:8px 10px}
  .th-inner{gap:4px}
  .col-inp{width:100%;max-width:92px}
  .row-label{flex-direction:column;align-items:flex-start;gap:4px}
  .row-name-inp{font-size:13px;min-width:0;width:100%}
  .cell-wrap{gap:4px}
  .cell-input{width:100%;max-width:92px;font-size:13px}
  .cell-date{font-size:9px}
  .max-val{font-size:12px;padding:5px 8px}
  .chart-icon{padding:8px;font-size:12px}
  .chart-panel, .modal{width:calc(100% - 1.5rem);max-width:100%}
  .modal{padding:1rem}
  .chart-body{padding:10px}
  .chart-tabs{overflow-x:auto}
  .chart-tab{white-space:nowrap}
}
.sidebar{background:var(--color-background-secondary,#f7f7f7);border-radius:var(--border-radius-lg,14px);border:0.5px solid var(--color-border-tertiary,#ddd);overflow:hidden}
.sidebar-head{padding:9px 12px;font-size:11px;font-weight:500;color:var(--color-text-tertiary,#666);letter-spacing:.05em;text-transform:uppercase;border-bottom:0.5px solid var(--color-border-tertiary,#ddd)}
.table-list{list-style:none}
.table-item{display:flex;align-items:center;gap:6px;padding:9px 12px;cursor:pointer;font-size:13px;border-bottom:0.5px solid var(--color-border-tertiary,#ddd);transition:background .1s}
.table-item:last-child{border-bottom:none}
.table-item:hover{background:var(--color-background-primary,#fff)}
.table-item.active{background:var(--color-background-primary,#fff);font-weight:500}
.t-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t-del{font-size:11px;color:var(--color-text-tertiary,#666);cursor:pointer;padding:2px 5px;border:none;background:transparent;opacity:0;font-family:var(--font-sans,system-ui);flex-shrink:0}
.table-item:hover .t-del{opacity:1}
.add-t-btn{width:100%;padding:9px 12px;font-size:13px;color:var(--color-text-secondary,#444);text-align:left;border:none;background:transparent;cursor:pointer;font-family:var(--font-sans,system-ui);border-top:0.5px solid var(--color-border-tertiary,#ddd);transition:background .1s}
.add-t-btn:hover{background:var(--color-background-primary,#fff)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;margin-bottom:12px}
.stat{background:var(--color-background-secondary,#f7f7f7);border-radius:var(--border-radius-md,12px);padding:9px 12px}
.stat-label{font-size:11px;color:var(--color-text-tertiary,#666);margin-bottom:2px}
.stat-val{font-size:17px;font-weight:500}
.stat-val.green{color:#1D9E75}
.card{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#ddd);border-radius:var(--border-radius-lg,14px);overflow:hidden;margin-bottom:14px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary,#ddd);gap:8px;flex-wrap:wrap}
.card-title-input{font-size:15px;font-weight:500;border:none;background:transparent;color:var(--color-text-primary,#111);font-family:var(--font-sans,system-ui);flex:1;min-width:80px}
.card-title-input:focus{outline:none}
.card-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn{padding:5px 10px;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:var(--border-radius-md,12px);font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-primary,#111);transition:all .12s;white-space:nowrap;font-family:var(--font-sans,system-ui)}
.btn:hover{background:var(--color-background-secondary,#f7f7f7)}
.btn:active{transform:scale(.97)}
.btn-sep{border-style:dashed;color:var(--color-text-tertiary,#666)}
.btn-sep:hover{color:var(--color-text-secondary,#444);background:var(--color-background-secondary,#f7f7f7)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:500;color:var(--color-text-tertiary,#666);padding:8px 10px;text-align:center;background:var(--color-background-secondary,#f7f7f7);border-bottom:0.5px solid var(--color-border-tertiary,#ddd);white-space:nowrap}
th.label-th{text-align:left}
th.max-th{color:#0F6E56;background:rgba(29,158,117,0.07)}
th.chart-th{color:#185FA5;background:rgba(24,95,165,0.06)}
th.sep-th{background:var(--color-background-tertiary,#eee);width:18px;padding:0;border-left:0.5px solid var(--color-border-tertiary,#ddd);border-right:0.5px solid var(--color-border-tertiary,#ddd)}
.th-inner{display:flex;align-items:center;justify-content:center;gap:3px}
.col-inp{background:transparent;border:none;font-size:11px;font-weight:500;color:var(--color-text-tertiary,#666);font-family:var(--font-sans,system-ui);text-align:center;width:68px;min-width:36px}
.col-inp:focus{outline:none;color:var(--color-text-primary,#111)}
.xbtn{font-size:10px;cursor:pointer;color:var(--color-text-tertiary,#666);border:none;background:transparent;padding:1px 3px;opacity:0;font-family:var(--font-sans,system-ui)}
th:hover .xbtn{opacity:1}
td{padding:6px 8px;border-bottom:0.5px solid var(--color-border-tertiary,#ddd);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary,#f7f7f7)}
td.sep-td{background:var(--color-background-tertiary,#eee);border-left:0.5px solid var(--color-border-tertiary,#ddd);border-right:0.5px solid var(--color-border-tertiary,#ddd);padding:0;width:18px}
tr.sep-row td{background:var(--color-background-tertiary,#eee);border-top:0.5px solid var(--color-border-tertiary,#ddd);border-bottom:0.5px solid var(--color-border-tertiary,#ddd);height:10px;padding:0}
tr.sep-row:hover td{background:var(--color-background-tertiary,#eee)}
.sep-row-del{opacity:0;cursor:pointer;font-size:10px;color:var(--color-text-tertiary,#666);border:none;background:transparent;font-family:var(--font-sans,system-ui);padding:0 4px}
tr.sep-row:hover .sep-row-del{opacity:1}
.sep-col-xbtn{opacity:0;font-size:9px;cursor:pointer;color:var(--color-text-tertiary,#666);border:none;background:transparent;padding:1px 2px;font-family:var(--font-sans,system-ui);display:block;width:100%;text-align:center}
th.sep-th:hover .sep-col-xbtn{opacity:1}
.row-label{display:flex;align-items:center;gap:4px}
.row-name-inp{background:transparent;border:none;font-size:13px;font-weight:500;color:var(--color-text-primary,#111);font-family:var(--font-sans,system-ui);flex:1;min-width:60px}
.row-name-inp:focus{outline:none}
.rxbtn{font-size:10px;cursor:pointer;color:var(--color-text-tertiary,#666);border:none;background:transparent;padding:1px 4px;opacity:0;font-family:var(--font-sans,system-ui)}
tr:hover .rxbtn{opacity:1}
.cell-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.cell-input{background:transparent;border:none;font-size:13px;color:var(--color-text-primary,#111);font-family:var(--font-sans,system-ui);text-align:center;width:62px;padding:2px 3px;border-radius:4px}
.cell-input:focus{outline:none;background:var(--color-background-secondary,#f7f7f7)}
.cell-date{font-size:10px;color:var(--color-text-tertiary,#666)}
.max-val{font-size:13px;font-weight:500;color:#0F6E56;text-align:center;padding:6px 10px}
.chart-icon{font-size:13px;cursor:pointer;color:#185FA5;text-align:center;padding:6px 10px;user-select:none}
.chart-icon:hover{background:rgba(24,95,165,0.08)}
.chart-panel{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,#ddd);border-radius:var(--border-radius-lg,14px);overflow:hidden;margin-bottom:14px}
.chart-panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary,#ddd)}
.chart-panel-title{font-size:14px;font-weight:500}
.chart-close{cursor:pointer;font-size:13px;color:var(--color-text-tertiary,#666);border:none;background:transparent;padding:3px 7px;border-radius:4px;font-family:var(--font-sans,system-ui)}
.chart-close:hover{background:var(--color-background-secondary,#f7f7f7)}
.chart-tabs{display:flex;gap:6px;padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary,#ddd);flex-wrap:wrap}
.chart-tab{padding:4px 10px;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:20px;font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-secondary,#666);font-family:var(--font-sans,system-ui);transition:all .1s}
.chart-tab:hover{background:var(--color-background-secondary,#f7f7f7)}
.chart-tab.active{background:var(--color-background-info,#E8F1FF);color:var(--color-text-info,#185FA5);border-color:transparent}
.chart-body{padding:14px}
.modal-overlay{min-height:180px;background:rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;border-radius:var(--border-radius-lg,14px);margin-top:8px}
.modal{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-secondary,#ccc);border-radius:var(--border-radius-lg,14px);padding:1.25rem;width:280px}
.modal h3{font-size:15px;font-weight:500;margin-bottom:.75rem}
.modal input{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary,#ccc);border-radius:var(--border-radius-md,12px);font-size:14px;color:var(--color-text-primary,#111);background:var(--color-background-primary,#fff);font-family:var(--font-sans,system-ui)}
.modal input:focus{outline:none;border-color:var(--color-border-primary,#888)}
.modal-acts{display:flex;gap:8px;margin-top:.75rem;justify-content:flex-end}
.btn-primary{background:var(--color-text-primary,#111);color:var(--color-background-primary,#fff);border-color:transparent}
.btn-primary:hover{opacity:.85}
.color-popup{position:absolute;z-index:50;background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-secondary,#ccc);border-radius:var(--border-radius-md,12px);padding:8px;display:flex;gap:5px;flex-wrap:wrap;width:132px}
.csw{width:18px;height:18px;border-radius:3px;cursor:pointer;border:0.5px solid rgba(0,0,0,.1);flex-shrink:0;transition:transform .1s}
.csw:hover{transform:scale(1.15)}
.empty-msg{padding:2.5rem;text-align:center;color:var(--color-text-tertiary,#666);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <span style="font-size:18px;line-height:1">💪</span>
      <span class="app-title">Gym Tracker</span>
    </div>
    <span class="save-pill" id="save-status">bereit</span>
  </div>
  <div class="layout">
    <div>
      <div class="sidebar">
        <div class="sidebar-head">Tabellen</div>
        <ul class="table-list" id="table-list"></ul>
        <button class="add-t-btn" id="add-t-btn">+ Neue Tabelle</button>
      </div>
    </div>
    <div id="main-area"></div>
  </div>
  <div id="modal-area"></div>
</div>

<script>
var STORAGE_KEY = 'gym_v5';
var S={tables:[],active:0};
var COLORS=['#E24B4A','#D85A30','#BA7517','#639922','#1D9E75','#185FA5','#534AB7','#D4537E','#888780'];
var openChartRow=null;
var activePopup=null;
var THREE_WEEKS=21*24*60*60*1000;

function now(){return Date.now();}
function save(){
  try{
    var data = JSON.stringify(S);
    if(window.storage && window.storage.set){
      window.storage.set(STORAGE_KEY,data);
    } else {
      window.localStorage.setItem(STORAGE_KEY,data);
    }
  }catch(e){}
  var el=document.getElementById('save-status');
  el.textContent='✓ gespeichert';
  setTimeout(function(){el.textContent='bereit';},1600);
}

function loadStorage(){
  try{
    if(window.storage && window.storage.get){
      return window.storage.get(STORAGE_KEY);
    }
    return {value: window.localStorage.getItem(STORAGE_KEY)};
  }catch(e){return null;}
}

function c_stale(c){if(!c.ts)return false;return(now()-c.ts)>THREE_WEEKS;}

function purgeStale(){
  var changed=false;
  S.tables.forEach(function(t){
    t.rows.forEach(function(r){
      if(r.sep) return;
      r.cells.forEach(function(c){
        if(c&&c.v!==''&&c_stale(c)){c.v='';c.ts=null;c.color=null;changed=true;}
      });
    });
  });
  if(changed) save();
}

function openModal(title,ph,cb){
  var a=document.getElementById('modal-area');
  a.innerHTML='';
  var ov=document.createElement('div');ov.className='modal-overlay';
  var m=document.createElement('div');m.className='modal';
  var h=document.createElement('h3');h.textContent=title;m.appendChild(h);
  var inp=document.createElement('input');inp.placeholder=ph||'';m.appendChild(inp);
  var acts=document.createElement('div');acts.className='modal-acts';
  var cancel=document.createElement('button');cancel.className='btn';cancel.textContent='Abbrechen';
  cancel.onclick=function(){a.innerHTML='';};
  var ok=document.createElement('button');ok.className='btn btn-primary';ok.textContent='OK';
  function confirm(){var v=inp.value.trim();if(!v)return;a.innerHTML='';cb(v);}
  ok.onclick=confirm;
  inp.onkeydown=function(e){if(e.key==='Enter')confirm();if(e.key==='Escape')a.innerHTML='';};
  acts.appendChild(cancel);acts.appendChild(ok);m.appendChild(acts);
  ov.appendChild(m);a.appendChild(ov);
  setTimeout(function(){inp.focus();},40);
}

function closePopup(){ if(activePopup&&activePopup.parentNode)activePopup.parentNode.removeChild(activePopup); activePopup=null; }
document.addEventListener('click',closePopup);

function showColorPicker(anchor,cb){
  closePopup();
  var pop=document.createElement('div');pop.className='color-popup';
  COLORS.forEach(function(c){
    var sw=document.createElement('div');sw.className='csw';sw.style.background=c;
    sw.onclick=function(e){e.stopPropagation();cb(c);closePopup();};
    pop.appendChild(sw);
  });
  var reset=document.createElement('div');reset.className='csw';
  reset.style.cssText='width:18px;height:18px;border-radius:3px;cursor:pointer;border:0.5px solid rgba(0,0,0,.2);background:var(--color-background-primary,#fff);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--color-text-secondary,#666)';
  reset.textContent='✕';
  reset.onclick=function(e){e.stopPropagation();cb(null);closePopup();};
  pop.appendChild(reset);
  anchor.style.position='relative';anchor.appendChild(pop);activePopup=pop;
  setTimeout(function(){pop.onclick=function(e){e.stopPropagation();};},0);
}

function drawChart(container,t,rowIdx){
  container.innerHTML='';
  var dataRows=t.rows.filter(function(r){return !r.sep;});
  if(!dataRows.length) return;
  var tabs=document.createElement('div');tabs.className='chart-tabs';
  function buildChart(targetRow){
    var points=[];
    t.cols.forEach(function(col,ci){
      if(col.sep) return;
      var c=targetRow.cells[ci];
      if(!c) return;
      var v=parseFloat(c.v||'');
      if(!isNaN(v)&&c.ts) points.push({label:col.name,v:v,ts:c.ts});
    });
    var chartWrap=document.createElement('div');chartWrap.className='chart-body';
    if(points.length<2){
      chartWrap.innerHTML='<div style="padding:1.5rem;text-align:center;color:var(--color-text-tertiary,#666);font-size:13px">Mindestens 2 Einträge mit Datum nötig.</div>';
      return chartWrap;
    }
    points.sort(function(a,b){return a.ts-b.ts;});
    var W=560,H=160,PL=36,PR=12,PT=12,PB=28;
    var cW=W-PL-PR,cH=H-PT-PB;
    var vals=points.map(function(p){return p.v;});
    var minV=Math.min.apply(null,vals),maxV=Math.max.apply(null,vals);
    if(minV===maxV){minV=minV-1;maxV=maxV+1;}
    var range=maxV-minV;
    function px(i){return PL+(i/(points.length-1))*cW;}
    function py(v){return PT+cH-((v-minV)/range)*cH;}
    var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:180px;display:block">';
    var gc='rgba(136,135,128,0.2)';
    for(var s=0;s<=4;s++){
      var gv=minV+(range/4)*s,gy=PT+cH-((gv-minV)/range)*cH;
      svg+='<line x1="'+PL+'" y1="'+gy+'" x2="'+(PL+cW)+'" y2="'+gy+'" stroke="'+gc+'" stroke-width="0.5"/>';
      svg+='<text x="'+(PL-4)+'" y="'+(gy+4)+'" text-anchor="end" font-size="10" fill="#888780">'+Math.round(gv)+'</text>';
    }
    var pathD='';
    points.forEach(function(p,i){pathD+=(i===0?'M':'L')+px(i)+' '+py(p.v)+' ';});
    svg+='<path d="M'+PL+' '+(PT+cH)+' '+pathD+'L'+(px(points.length-1))+' '+(PT+cH)+' Z" fill="#185FA5" fill-opacity="0.07"/>';
    svg+='<path d="'+pathD+'" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>';
    points.forEach(function(p,i){
      var cx=px(i),cy=py(p.v),isMx=p.v===maxV;
      svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(isMx?5:3)+'" fill="'+(isMx?'#1D9E75':'#185FA5')+'" stroke="var(--color-background-primary,#fff)" stroke-width="1.5"/>';
      svg+='<text x="'+cx+'" y="'+(PT+cH+18)+'" text-anchor="middle" font-size="10" fill="#888780">'+p.label+'</text>';
      if(isMx) svg+='<text x="'+cx+'" y="'+(cy-9)+'" text-anchor="middle" font-size="10" fill="#0F6E56" font-weight="500">'+p.v+'</text>';
    });
    svg+='</svg>';
    chartWrap.innerHTML=svg;
    return chartWrap;
  }

  dataRows.forEach(function(row,ri){
    var tab=document.createElement('button');tab.className='chart-tab'+(ri===rowIdx?' active':'');
    tab.textContent=row.label;
    tab.onclick=function(){
      tabs.querySelectorAll('.chart-tab').forEach(function(tb){tb.className='chart-tab';});
      tab.className='chart-tab active';
      var old=container.querySelector('.chart-body');if(old)container.removeChild(old);
      container.appendChild(buildChart(row));
    };
    tabs.appendChild(tab);
  });
  container.appendChild(tabs);
  container.appendChild(buildChart(dataRows[rowIdx]||dataRows[0]));
}

function render(){renderSidebar();renderMain();}

function renderSidebar(){
  var list=document.getElementById('table-list');list.innerHTML='';
  S.tables.forEach(function(t,i){
    var li=document.createElement('li');li.className='table-item'+(i===S.active?' active':'');
    var nm=document.createElement('span');nm.className='t-name';nm.textContent=t.name;
    var del=document.createElement('button');del.className='t-del';del.textContent='✕';
    del.onclick=function(e){
      e.stopPropagation();
      if(!confirm('Tabelle "'+t.name+'" löschen?'))return;
      S.tables.splice(i,1);
      if(S.active>=S.tables.length)S.active=Math.max(0,S.tables.length-1);
      openChartRow=null;save();render();
    };
    li.appendChild(nm);li.appendChild(del);
    li.onclick=function(){S.active=i;openChartRow=null;render();};
    list.appendChild(li);
  });
  document.getElementById('add-t-btn').onclick=function(){
    openModal('Name der neuen Tabelle','z.B. Kreuzheben',function(name){
      S.tables.push({name:name,cols:[{name:'Einheit 1',sep:false}],rows:[{label:'Set 1',sep:false,cells:[{v:'',ts:null,color:null}]}]});
      S.active=S.tables.length-1;openChartRow=null;save();render();
    });
  };
}

function renderMain(){
  var area=document.getElementById('main-area');area.innerHTML='';
  if(!S.tables.length){area.innerHTML='<div class="empty-msg">Keine Tabellen – erstelle eine über die Seitenleiste.</div>';return;}
  var t=S.tables[S.active];

  var allNums=[];
  t.rows.forEach(function(r){
    if(r.sep)return;
    r.cells.forEach(function(c){if(c){var v=parseFloat(c.v||'');if(!isNaN(v))allNums.push(v);}});
  });
  var best=allNums.length?Math.max.apply(null,allNums):'–';
  var dataRows=t.rows.filter(function(r){return !r.sep;});
  var dataCols=t.cols.filter(function(c){return !c.sep;});
  var filled=dataRows.reduce(function(a,r){return a+r.cells.filter(function(c){return c&&c.v!=='';}).length;},0);
  var total=dataRows.length*dataCols.length;

  var stats=document.createElement('div');stats.className='stats-row';
  stats.innerHTML=
    '<div class="stat"><div class="stat-label">Zeilen</div><div class="stat-val">'+dataRows.length+'</div></div>'+
    '<div class="stat"><div class="stat-label">Spalten</div><div class="stat-val">'+dataCols.length+'</div></div>'+
    '<div class="stat"><div class="stat-label">All-Time-Max</div><div class="stat-val green">'+best+'</div></div>'+
    '<div class="stat"><div class="stat-label">Einträge</div><div class="stat-val">'+filled+'/'+total+'</div></div>';
  area.appendChild(stats);

  var card=document.createElement('div');card.className='card';
  var head=document.createElement('div');head.className='card-head';
  var tInp=document.createElement('input');tInp.className='card-title-input';tInp.value=t.name;
  tInp.onchange=function(){t.name=this.value;save();renderSidebar();};
  var acts=document.createElement('div');acts.className='card-actions';
  function mkBtn(label,cls,fn){var b=document.createElement('button');b.className='btn'+(cls?' '+cls:'');b.textContent=label;b.onclick=fn;return b;}
  acts.appendChild(mkBtn('+ Spalte','',function(){
    openModal('Name der neuen Spalte','z.B. 01.05',function(name){
      t.cols.push({name:name,sep:false});
      t.rows.forEach(function(r){if(!r.sep)r.cells.push({v:'',ts:null,color:null});else r.cells.push(null);});
      save();renderMain();
    });
  }));
  acts.appendChild(mkBtn('+ Zeile','',function(){
    openModal('Name der neuen Zeile','z.B. Set 2',function(name){
      t.rows.push({label:name,sep:false,cells:t.cols.map(function(c){return c.sep?null:{v:'',ts:null,color:null};})});
      save();renderMain();
    });
  }));
  acts.appendChild(mkBtn('— Trennzeile','btn-sep',function(){
    t.rows.push({label:'',sep:true,cells:t.cols.map(function(){return null;})});
    save();renderMain();
  }));
  acts.appendChild(mkBtn('| Trennspalte','btn-sep',function(){
    t.cols.push({name:'',sep:true});
    t.rows.forEach(function(r){r.cells.push(null);});
    save();renderMain();
  }));
  head.appendChild(tInp);head.appendChild(acts);card.appendChild(head);

  var wrap=document.createElement('div');wrap.className='table-wrap';
  var tbl=document.createElement('table');
  var thead=document.createElement('thead');
  var hrow=document.createElement('tr');
  var th0=document.createElement('th');th0.className='label-th';th0.textContent='Übung / Set';hrow.appendChild(th0);

  t.cols.forEach(function(col,ci){
    if(col.sep){
      var thS=document.createElement('th');thS.className='sep-th';
      var xbS=document.createElement('button');xbS.className='sep-col-xbtn';xbS.textContent='✕';xbS.title='Trennspalte löschen';
      xbS.onclick=function(){t.cols.splice(ci,1);t.rows.forEach(function(r){r.cells.splice(ci,1);});save();renderMain();};
      thS.appendChild(xbS);hrow.appendChild(thS);return;
    }
    var th=document.createElement('th');
    var inner=document.createElement('div');inner.className='th-inner';
    var inp=document.createElement('input');inp.className='col-inp';inp.value=col.name;
    inp.onchange=function(){col.name=this.value;save();};
    var xb=document.createElement('button');xb.className='xbtn';xb.textContent='✕';
    xb.onclick=function(){
      if(dataCols.length<=1){alert('Mindestens 1 Datenspalte erforderlich.');return;}
      t.cols.splice(ci,1);t.rows.forEach(function(r){r.cells.splice(ci,1);});save();renderMain();
    };
    inner.appendChild(inp);inner.appendChild(xb);th.appendChild(inner);hrow.appendChild(th);
  });

  var thMax=document.createElement('th');thMax.className='max-th';thMax.textContent='Max';hrow.appendChild(thMax);
  var thChart=document.createElement('th');thChart.className='chart-th';thChart.textContent='Verlauf';hrow.appendChild(thChart);
  thead.appendChild(hrow);tbl.appendChild(thead);

  var tbody=document.createElement('tbody');
  t.rows.forEach(function(row,ri){
    if(row.sep){
      var tr=document.createElement('tr');tr.className='sep-row';
      var tdL=document.createElement('td');
      var rdel=document.createElement('button');rdel.className='sep-row-del';rdel.textContent='✕';rdel.title='Trennzeile löschen';
      rdel.onclick=function(){t.rows.splice(ri,1);save();renderMain();};
      tdL.appendChild(rdel);tr.appendChild(tdL);
      t.cols.forEach(function(){var td=document.createElement('td');tr.appendChild(td);});
      var tdMax=document.createElement('td');tr.appendChild(tdMax);
      var tdCh=document.createElement('td');tr.appendChild(tdCh);
      tbody.appendChild(tr);return;
    }
    var tr=document.createElement('tr');
    var td0=document.createElement('td');
    var lw=document.createElement('div');lw.className='row-label';
    var lInp=document.createElement('input');lInp.className='row-name-inp';lInp.value=row.label;
    lInp.onchange=function(){row.label=this.value;save();};
    var rxb=document.createElement('button');rxb.className='rxbtn';rxb.textContent='✕';
    rxb.onclick=function(){
      if(dataRows.length<=1){alert('Mindestens 1 Datenzeile erforderlich.');return;}
      t.rows.splice(ri,1);if(openChartRow===ri)openChartRow=null;save();renderMain();
    };
    lw.appendChild(lInp);lw.appendChild(rxb);td0.appendChild(lw);tr.appendChild(td0);

    var maxTd=document.createElement('td');maxTd.className='max-val';
    function upMax(){
      var n=row.cells.filter(function(c){return c;}).map(function(c){return parseFloat(c.v||'');}).filter(function(x){return !isNaN(x);});
      maxTd.textContent=n.length?Math.max.apply(null,n):'–';
    }

    row.cells.forEach(function(cell,ci){
      var col=t.cols[ci];
      if(col&&col.sep){
        var tdS=document.createElement('td');tdS.className='sep-td';tr.appendChild(tdS);return;
      }
      if(!cell){var tdE=document.createElement('td');tr.appendChild(tdE);return;}
      var td=document.createElement('td');td.style.textAlign='center';
      var cw=document.createElement('div');cw.className='cell-wrap';
      var colorDot=document.createElement('span');
      colorDot.style.cssText='display:inline-block;width:7px;height:7px;border-radius:50%;cursor:pointer;margin-bottom:1px;flex-shrink:0';
      colorDot.style.background=cell.color||'var(--color-border-tertiary,#ddd)';
      colorDot.onclick=function(e){
        e.stopPropagation();
        showColorPicker(cw,function(c){cell.color=c;colorDot.style.background=c||'var(--color-border-tertiary,#ddd)';cInp.style.color=c||'var(--color-text-primary,#111)';save();});
      };
      var cInp=document.createElement('input');cInp.className='cell-input';
      cInp.value=cell.v;cInp.type='text';cInp.inputMode='decimal';
      if(cell.color)cInp.style.color=cell.color;
      var dateLabel=document.createElement('div');dateLabel.className='cell-date';
      if(cell.ts){
        var d=new Date(cell.ts);
        var dl=Math.ceil((THREE_WEEKS-(now()-cell.ts))/(24*60*60*1000));
        if(dl>0)dateLabel.textContent=d.getDate()+'.'+(d.getMonth()+1)+' ('+dl+'T)';
        else{dateLabel.textContent='abgelaufen';dateLabel.style.color='#D85A30';}
      }
      cInp.oninput=function(){cell.v=this.value;upMax();};
      cInp.onchange=function(){
        cell.v=this.value.trim();
        cell.ts=cell.v!==''?now():null;
        if(cell.ts){var d2=new Date();dateLabel.textContent=d2.getDate()+'.'+(d2.getMonth()+1)+' (21T)';dateLabel.style.color='';}
        else dateLabel.textContent='';
        upMax();save();
        if(openChartRow===ri)renderChartPanel(t,ri);
      };
      cw.appendChild(colorDot);cw.appendChild(cInp);cw.appendChild(dateLabel);
      td.appendChild(cw);tr.appendChild(td);
    });

    tr.appendChild(maxTd);
    var chartTd=document.createElement('td');chartTd.className='chart-icon';chartTd.textContent='↗';
    chartTd.onclick=function(){
      if(openChartRow===ri){openChartRow=null;var cp=document.getElementById('chart-panel');if(cp)cp.remove();}
      else{openChartRow=ri;renderChartPanel(t,ri);}
    };
    tr.appendChild(chartTd);
    upMax();tbody.appendChild(tr);
  });

  tbl.appendChild(tbody);wrap.appendChild(tbl);card.appendChild(wrap);area.appendChild(card);
  if(openChartRow!==null)renderChartPanel(t,openChartRow);
}

function renderChartPanel(t,ri){
  var area=document.getElementById('main-area');
  var old=document.getElementById('chart-panel');if(old)old.remove();
  var panel=document.createElement('div');panel.className='chart-panel';panel.id='chart-panel';
  var ph=document.createElement('div');ph.className='chart-panel-head';
  var pt=document.createElement('span');pt.className='chart-panel-title';pt.textContent='Verlauf – '+t.name;
  var pc=document.createElement('button');pc.className='chart-close';pc.textContent='Schließen ✕';
  pc.onclick=function(){openChartRow=null;panel.remove();};
  ph.appendChild(pt);ph.appendChild(pc);panel.appendChild(ph);
  var body=document.createElement('div');
  var dataRows=t.rows.filter(function(r){return !r.sep;});
  var targetIdx=Math.min(ri,dataRows.length-1);
  drawChart(body,t,targetIdx);
  panel.appendChild(body);area.appendChild(panel);
}

async function load(){
  try{
    var stored = loadStorage();
    if(stored && stored.value) S = JSON.parse(stored.value);
  }catch(e){}
  if(!S.tables||!S.tables.length){
    var base=now()-10*24*60*60*1000;
    S={active:0,tables:[
      {name:'Bankdrücken',
        cols:[{name:'01.01',sep:false},{name:'08.01',sep:false},{name:'15.01',sep:false},{name:'22.01',sep:false}],
        rows:[
          {label:'Set 1 (kg)',sep:false,cells:[{v:'60',ts:base,color:null},{v:'65',ts:base+7*864e5,color:null},{v:'65',ts:base+14*864e5,color:null},{v:'70',ts:now()-2*864e5,color:'#1D9E75'}]},
          {label:'Set 2 (kg)',sep:false,cells:[{v:'55',ts:base,color:null},{v:'60',ts:base+7*864e5,color:null},{v:'62',ts:base+14*864e5,color:null},{v:'65',ts:now()-2*864e5,color:null}]},
          {label:'Wdh.',sep:false,cells:[{v:'10',ts:base,color:null},{v:'10',ts:base+7*864e5,color:null},{v:'12',ts:base+14*864e5,color:null},{v:'10',ts:now()-2*864e5,color:null}]}
        ]},
      {name:'Kniebeugen',
        cols:[{name:'01.01',sep:false},{name:'08.01',sep:false},{name:'15.01',sep:false}],
        rows:[
          {label:'Set 1 (kg)',sep:false,cells:[{v:'80',ts:base,color:null},{v:'85',ts:base+7*864e5,color:null},{v:'90',ts:now()-864e5,color:'#1D9E75'}]},
          {label:'Set 2 (kg)',sep:false,cells:[{v:'75',ts:base,color:null},{v:'80',ts:base+7*864e5,color:null},{v:'85',ts:now()-864e5,color:null}]}
        ]}
    ]};
  }
  purgeStale();render();
}
load();
</script>
</body>
